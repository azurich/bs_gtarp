services:
  casino:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # FORCE la base dans le volume persisté (sinon perte de données au recreate
      # du conteneur). Surcharge un éventuel DB_FILE défini dans .env.
      - DB_FILE=/app/data/blackstate.db
    volumes:
      # SQLite persisté sur le host dans ./data/blackstate.db
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BlackState — Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/core/tokens.css">
  <link rel="stylesheet" href="/club.css">
  <link rel="stylesheet" href="/core/shell.css">
  <link rel="stylesheet" href="/responsive.css">
  <script defer src="/lucide.min.js"></script>
  <script defer src="/core/auth.js"></script>
  <script defer src="/core/shell.js"></script>
  <script defer src="/club.js"></script>
</head>
<body data-universe="club">
  <div id="toast"></div>
  <div id="modalOverlay" class="hidden">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn ghost sm" onclick="closeModal()">Annuler</button>
        <button class="btn sm" data-modal-confirm onclick="confirmModal()">Confirmer</button>
      </div>
    </div>
  </div>

  <main class="portal">

    <!-- CONNEXION (déconnecté) -->
    <section id="portalLogin" class="portal-gate hidden">
      <h1 class="portal-logo">Black<span>State</span></h1>
      <p class="portal-pitch">Club privé de Los Santos — casino, et bientôt l'arène Fight.</p>
      <div class="portal-card">
        <label>Pseudo<input id="loginUser" autocomplete="username"></label>
        <label>Mot de passe<input id="loginPass" type="password" autocomplete="current-password"></label>
        <div id="loginErr" class="form-err"></div>
        <button class="btn" onclick="doPortalLogin()">Entrer dans le club</button>
        <p class="portal-note">L'accès se fait uniquement sur invitation.</p>
      </div>
    </section>

    <!-- INSCRIPTION (via lien d'invitation) -->
    <section id="registerSection" class="portal-gate hidden">
      <h1 class="portal-logo">Black<span>State</span></h1>
      <div class="portal-card">
        <h2>Créer mon compte</h2>
        <p id="inviteBanner" class="invite-banner"></p>
        <div class="reg-grid">
          <label>Pseudo (login)<input id="regUser" autocomplete="username"></label>
          <label>Mot de passe<input id="regPass" type="password" autocomplete="new-password"></label>
          <label>NOM<input id="regNom"></label>
          <label>Prénom<input id="regPrenom"></label>
          <label>Numéro (tél RP)<input id="regPhone"></label>
          <label>id Discord<input id="regDiscord"></label>
        </div>
        <div id="regErr" class="form-err"></div>
        <button class="btn" onclick="submitRegister()">Créer mon compte</button>
      </div>
    </section>

    <!-- HUB (connecté) -->
    <section id="portalHub" class="portal-hub hidden">
      <div class="hub-top">
        <h1 class="portal-logo sm">Black<span>State</span></h1>
        <button class="btn ghost sm" onclick="logout()">Déconnexion</button>
      </div>
      <p class="hub-hello">Bonjour <b id="hubUser"></b></p>
      <div class="hub-wallet">
        <span class="hub-wallet-lbl">Crédits Club</span>
        <span class="hub-wallet-val"><span class="bs-coin"></span><b id="hubCredit" data-credit>0</b></span>
      </div>
      <div class="universe-cards">
        <a class="universe-card uni-casino" href="/casino">
          <span class="uni-ic"><i data-lucide="dice-5"></i></span>
          <span class="uni-name">Casino</span>
          <span class="uni-desc">Machines, cartes, roue…</span>
        </a>
        <span class="universe-card uni-fight disabled">
          <span class="uni-ic"><i data-lucide="swords"></i></span>
          <span class="uni-name">Fight</span>
          <span class="uni-desc">Combats — Bientôt</span>
        </span>
        <a class="universe-card uni-profil" href="/profil">
          <span class="uni-ic"><i data-lucide="user"></i></span>
          <span class="uni-name">Profil</span>
          <span class="uni-desc">Mes infos & stats</span>
        </a>
      </div>
    </section>

  </main>
</body>
</html>

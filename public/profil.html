<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BlackState — Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/core/tokens.css">
  <link rel="stylesheet" href="/club.css">
  <link rel="stylesheet" href="/core/shell.css">
  <link rel="stylesheet" href="/responsive.css">
  <script defer src="/lucide.min.js"></script>
  <script defer src="/core/auth.js"></script>
  <script defer src="/core/shell.js"></script>
  <script defer src="/profil.js"></script>
</head>
<body data-universe="club">
  <div id="toast"></div>

  <main class="page">
    <div class="page-head">
      <a class="bs-logo" href="/">Black<span>State</span></a>
      <a class="btn ghost sm side-portal" href="/"><i data-lucide="arrow-left"></i> Portail</a>
    </div>

    <section class="club-section">
      <h2>Compte — <span id="pName"></span></h2>
      <div class="hub-wallet" style="margin-top:6px">
        <span class="hub-wallet-lbl">Crédits Club</span>
        <span class="hub-wallet-val"><span class="bs-coin"></span><b id="pCredit" data-credit>0</b></span>
      </div>
    </section>

    <section class="club-section">
      <h2>Infos RP</h2>
      <div class="reg-grid">
        <label>NOM<input id="pNom"></label>
        <label>Prénom<input id="pPrenom"></label>
        <label>Numéro<input id="pPhone"></label>
        <label>id Discord<input id="pDiscord"></label>
      </div>
      <div id="pErr" class="form-err"></div>
      <button class="btn" onclick="saveProfile()">Enregistrer</button>
    </section>

    <section class="club-section">
      <h2>Mot de passe</h2>
      <div class="reg-grid">
        <label>Mot de passe actuel
          <div class="pw-field">
            <input id="pwCurrent" type="password" autocomplete="current-password">
            <button type="button" class="pw-eye" onclick="togglePw('pwCurrent', this)" aria-label="Afficher / masquer"><i data-lucide="eye"></i></button>
          </div>
        </label>
        <span></span>
        <label>Nouveau mot de passe
          <div class="pw-field">
            <input id="pwNew" type="password" autocomplete="new-password">
            <button type="button" class="pw-eye" onclick="togglePw('pwNew', this)" aria-label="Afficher / masquer"><i data-lucide="eye"></i></button>
          </div>
        </label>
        <label>Confirmer le nouveau mot de passe
          <div class="pw-field">
            <input id="pwConfirm" type="password" autocomplete="new-password">
            <button type="button" class="pw-eye" onclick="togglePw('pwConfirm', this)" aria-label="Afficher / masquer"><i data-lucide="eye"></i></button>
          </div>
        </label>
      </div>
      <div id="pwErr" class="form-err"></div>
      <button class="btn" onclick="changePassword()">Enregistrer le mot de passe</button>
    </section>

    <section class="club-section">
      <h2>Casino</h2>
      <div id="pStats" class="profil-stats"></div>
    </section>

    <section class="club-section">
      <h2>Fight</h2>
      <p class="club-text">Vos statistiques de combat apparaîtront ici. <b>Bientôt disponible.</b></p>
    </section>
  </main>
</body>
</html>
